```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barreto App</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#f2f2f7;
}

.container{
max-width:430px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,button,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:black;
color:white;
border:none;
cursor:pointer;
}

.menu{
display:flex;
gap:10px;
margin-bottom:20px;
}

.menu button{
flex:1;
background:#007aff;
}

.aba{
display:none;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginScreen" class="card">
<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="register()">Criar Conta</button>
</div>

<!-- APP -->
<div id="appScreen" style="display:none;">

<div class="menu">
<button onclick="mostrarAba('clientes')">Clientes</button>
<button onclick="mostrarAba('servicos')">Serviços</button>
<button onclick="mostrarAba('financeiro')">Financeiro</button>
</div>

<!-- CLIENTES -->
<div id="clientes" class="aba">

<div class="card">
<h2>Cadastro Cliente</h2>

<input type="text" id="nome" placeholder="Nome">
<input type="text" id="telefone" placeholder="Telefone">
<input type="text" id="cep" placeholder="CEP">

<select id="tipo">
<option value="">Tipo de imóvel</option>
<option value="Casa">Casa</option>
<option value="Apartamento">Apartamento</option>
</select>

<input type="text" id="numero" placeholder="Número">
<input type="text" id="complemento" placeholder="Complemento">

<input type="text" id="rua" placeholder="Rua">
<input type="text" id="bairro" placeholder="Bairro">
<input type="text" id="cidade" placeholder="Cidade">

<button onclick="salvarCliente()">Salvar</button>
</div>

<div class="card">
<h2>Buscar Cliente</h2>
<input type="text" id="busca" placeholder="Digite o nome">
<button onclick="buscarCliente()">Buscar</button>
<div id="resultado"></div>
</div>

</div>

<!-- SERVIÇOS -->
<div id="servicos" class="aba">

<div id="areaServicos" class="card" style="display:none;">

<h2>Serviços do Cliente</h2>

<input type="text" id="descricaoServico" placeholder="Descrição">

<input type="number" id="valorServico" placeholder="Valor">

<select id="formaPagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
<option>Transferência</option>
</select>

<label>Início Previsto</label>
<input type="date" id="dataInicioPrevista">

<label>Fim Previsto</label>
<input type="date" id="dataFimPrevista">

<select id="statusServico">
<option>Orçamento</option>
<option>Agendado</option>
<option>Em andamento</option>
<option>Finalizado</option>
</select>

<button onclick="salvarServico()">Salvar Serviço</button>

<hr>

<div id="listaServicos"></div>

</div>

</div>

<!-- FINANCEIRO -->
<div id="financeiro" class="aba">

<div class="card">

<h2>Relatório Financeiro</h2>

<p>Total Recebido: R$ <span id="totalRecebido">0</span></p>
<p>Total a Receber: R$ <span id="totalReceber">0</span></p>
<p>Pago no Pix: R$ <span id="totalPix">0</span></p>
<p>Pago no Dinheiro: R$ <span id="totalDinheiro">0</span></p>
<p>Pago no Cartão: R$ <span id="totalCartao">0</span></p>

<button onclick="calcularFinanceiro()">Atualizar Relatório</button>

</div>

</div>

<button onclick="logout()">Sair</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, getDocs, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSy",
authDomain: "barreto-f590b.firebaseapp.com",
projectId: "barreto-f590b",
storageBucket: "barreto-f590b.firebasestorage.app",
messagingSenderId: "780260431308",
appId: "1:780260431308:web:71f990a107e4cc62db7969"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let clienteServicoId = null;

window.mostrarAba = function(aba){
document.querySelectorAll(".aba").forEach(el=>el.style.display="none");
document.getElementById(aba).style.display="block";
}

onAuthStateChanged(auth,(user)=>{
if(user){
loginScreen.style.display="none";
appScreen.style.display="block";
mostrarAba("clientes");
}else{
loginScreen.style.display="block";
appScreen.style.display="none";
}
});

window.login = async function(){
await signInWithEmailAndPassword(auth,email.value,password.value);
}

window.register = async function(){
await createUserWithEmailAndPassword(auth,email.value,password.value);
}

window.logout = async function(){
await signOut(auth);
location.reload();
}

/* CLIENTE */

window.salvarCliente = async function(){

await addDoc(collection(db,"clientes"),{
nome:nome.value,
telefone:telefone.value,
cep:cep.value,
tipo:tipo.value,
numero:numero.value,
complemento:complemento.value,
rua:rua.value,
bairro:bairro.value,
cidade:cidade.value
});

alert("Cliente salvo");

}

window.buscarCliente = async function(){

const q=query(collection(db,"clientes"),where("nome","==",busca.value));
const snap=await getDocs(q);

resultado.innerHTML="";

snap.forEach((docSnap)=>{

const c=docSnap.data();

resultado.innerHTML+=`

<div class="card">

<strong>${c.nome}</strong><br>
${c.telefone}

<button onclick="abrirServicos('${docSnap.id}')">
Serviços
</button>

</div>

`;

});

}

/* SERVIÇOS */

window.abrirServicos = async function(id){

clienteServicoId=id;

mostrarAba("servicos");

document.getElementById("areaServicos").style.display="block";

listarServicos();

}

async function listarServicos(){

const q=query(collection(db,"servicos"),where("clienteId","==",clienteServicoId));
const snap=await getDocs(q);

listaServicos.innerHTML="";

snap.forEach((docSnap)=>{

const s=docSnap.data();

listaServicos.innerHTML+=`

<div class="card">

<strong>${s.descricao}</strong><br>

Valor: R$ ${s.valor}<br>
Pago: R$ ${s.pago || 0}<br>
Restante: R$ ${s.restante || s.valor}<br>
Status: ${s.status}

</div>

`;

});

}

window.salvarServico = async function(){

const valor=Number(valorServico.value);

await addDoc(collection(db,"servicos"),{

clienteId:clienteServicoId,
descricao:descricaoServico.value,
valor:valor,
pago:0,
restante:valor,
status:statusServico.value

});

listarServicos();

}

/* FINANCEIRO */

window.calcularFinanceiro = async function(){

const snap=await getDocs(collection(db,"servicos"));

let recebido=0;
let receber=0;

snap.forEach((docSnap)=>{

const s=docSnap.data();

recebido+=s.pago || 0;
receber+=s.restante || 0;

});

totalRecebido.innerText=recebido.toFixed(2);
totalReceber.innerText=receber.toFixed(2);

}

</script>

</body>
</html>
```
