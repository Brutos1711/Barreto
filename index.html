<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barreto App Premium 2.0</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;}
.dark{background:#0f172a;color:#e2e8f0}
.dark .card{background:#1e293b}

.sidebar{
position:fixed;left:-260px;top:0;width:240px;height:100%;
background:#111827;color:#fff;transition:.3s;z-index:1000;padding-top:20px
}
.sidebar.active{left:0}

.sidebar button{width:100%;padding:15px;text-align:left;border:none;color:#fff}
.sidebar button:hover{background:#1f2937}

.topbar{background:#111827;color:#fff;padding:15px;display:flex;align-items:center}

.card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,0.08)}
.btn{background:#2563eb;color:#fff;padding:12px;border-radius:12px;width:100%;margin-top:10px}
.input{width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;margin-top:10px}
</style>
</head>

<body class="bg-gray-100">

<div id="menu" class="sidebar">
<button onclick="toggleMenu()">⬅ Voltar</button>
<button onclick="abrirPagina('dashboard')">🏠 Painel</button>
<button onclick="abrirPagina('servicos')">🛠 Serviços</button>
<button onclick="abrirPagina('config')">⚙️ Configurações</button>
</div>

<div class="topbar">
<span onclick="toggleMenu()" style="cursor:pointer;margin-right:10px">☰</span>
Barreto Premium 2.0
</div>

<div id="app" class="max-w-md mx-auto p-4 space-y-4 hidden">

<!-- DASHBOARD -->
<div id="paginaDashboard" class="card">
<h2 class="text-xl font-bold mb-3">📊 Dashboard</h2>

<div class="grid grid-cols-2 gap-3">
<div class="card">
<div class="text-sm text-gray-400">Serviços</div>
<div id="dashServicos" class="text-2xl font-bold">0</div>
</div>

<div class="card">
<div class="text-sm text-gray-400">Recebido</div>
<div id="dashRecebido" class="text-2xl font-bold">R$ 0</div>
</div>
</div>

</div>

<!-- SERVIÇOS -->
<div id="paginaServicos" class="card hidden">
<h2 class="text-xl font-bold">Novo Serviço</h2>

<input id="cliente" class="input" placeholder="Cliente">
<input id="descricao" class="input" placeholder="Descrição">
<input id="valor" type="number" class="input" placeholder="Valor">

<button class="btn" onclick="salvarServico()">Salvar</button>

<hr class="my-4">

<h3 class="font-bold mb-2">Lista</h3>
<div id="listaServicos"></div>
</div>

<!-- CONFIG -->
<div id="paginaConfig" class="card hidden">
<h2 class="text-xl font-bold">⚙️ Configurações</h2>

<input id="novoUser" class="input" placeholder="Novo usuário">
<input id="novaSenha" type="password" class="input" placeholder="Nova senha">

<button class="btn" onclick="salvarConta()">💾 Salvar Conta</button>
<button class="btn" onclick="toggleTema()">🌙 Tema</button>
<button class="btn" onclick="resetarDados()">🧹 Limpar dados</button>
<button class="btn" onclick="exportar()">📤 Exportar dados</button>
<button class="btn" onclick="importar()">📥 Importar dados</button>
<button class="btn" onclick="limparServicos()">🗑 Limpar serviços</button>
<button class="btn" onclick="logout()">🚪 Sair</button>
</div>

</div>

<script>

// MENU
function toggleMenu(){
document.getElementById('menu').classList.toggle('active')
}

function abrirPagina(p){
['paginaDashboard','paginaServicos','paginaConfig'].forEach(id=>{
document.getElementById(id).classList.add('hidden')
})
document.getElementById('pagina'+capitalize(p)).classList.remove('hidden')
toggleMenu()
}

function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1)}

// LOGIN
function iniciar(){
  const user = localStorage.getItem('user')
  const logado = localStorage.getItem('logado')

  // Se já está logado → entra direto
  if(logado === 'true'){
    document.getElementById('app').classList.remove('hidden')
    carregarServicos()
    return
  }

  // Se não tem usuário → cadastro
  if(!user){
    telaCadastro()
  }else{
    telaLogin()
  }
}

async function biometria(){
  if(!window.PublicKeyCredential){
    alert('Biometria não suportada nesse dispositivo')
    return
  }

  try{
    await navigator.credentials.get({
      publicKey:{
        challenge:new Uint8Array(32),
        timeout:60000,
        userVerification:"required"
      }
    })

    localStorage.setItem('logado','true')
    location.reload()

  }catch(e){
    alert('Falha na biometria')
  }
}

function limparServicos(){
if(confirm('Excluir todos serviços?')){
localStorage.removeItem('servicos')
carregarServicos()
}
}
  
function importar(){
const input = document.createElement('input')
input.type = 'file'

input.onchange = e=>{
const file = e.target.files[0]
const reader = new FileReader()

reader.onload = ()=>{
localStorage.setItem('servicos', reader.result)
carregarServicos()
}

reader.readAsText(file)
}

input.click()
}
  
function exportar(){
const dados = localStorage.getItem('servicos')
const blob = new Blob([dados], {type:"application/json"})
const a = document.createElement('a')
a.href = URL.createObjectURL(blob)
a.download = "backup_servicos.json"
a.click()
}
  
function telaCadastro(){
document.body.innerHTML = `
<div style="display:flex;justify-content:center;align-items:center;height:100vh">
<div class="card">
<h2>Cadastro</h2>
<input id="user" class="input" placeholder="Usuário">
<input id="pass" type="password" class="input" placeholder="Senha">
<button class="btn" onclick="cadastrar()">Criar conta</button>
</div>
</div>`
}

function cadastrar(){
localStorage.setItem('user',user.value)
localStorage.setItem('pass',pass.value)
alert('Conta criada!')
location.reload()
}

function telaLogin(){
document.body.innerHTML = `
<div style="display:flex;justify-content:center;align-items:center;height:100vh">
<div class="card">
<h2>Login</h2>
<input id="user" class="input" placeholder="Usuário">
<input id="pass" type="password" class="input" placeholder="Senha">
<button class="btn" onclick="login()">Entrar</button>
<button class="btn" onclick="biometria()">🔐 Entrar com digital</button>
</div>
</div>`
}

function login(){
if(user.value === localStorage.getItem('user') &&
pass.value === localStorage.getItem('pass')){
localStorage.setItem('logado','true')
location.reload()
}else{
alert('Erro no login')
}
}

function logout(){
localStorage.removeItem('logado')
location.reload()
}

// SERVIÇOS
function salvarServico(){
let lista = JSON.parse(localStorage.getItem('servicos')||'[]')

lista.push({
cliente:cliente.value,
descricao:descricao.value,
valor:Number(valor.value)
})

localStorage.setItem('servicos',JSON.stringify(lista))

cliente.value = ''
descricao.value = ''
valor.value = ''

carregarServicos()
}

function carregarServicos(){
let lista = JSON.parse(localStorage.getItem('servicos')||'[]')
const div = document.getElementById('listaServicos')
div.innerHTML = ''

let total = 0

lista.forEach((s,i)=>{
total += s.valor

div.innerHTML += `
<div class="card mt-2">
<b>${s.cliente}</b><br>
${s.descricao}<br>
R$ ${s.valor}
<button class="btn" onclick="excluir(${i})">Excluir</button>
</div>`
})

document.getElementById('dashServicos').innerText = lista.length
document.getElementById('dashRecebido').innerText = 
'R$ '+total.toFixed(2)
}

function excluir(i){
let lista = JSON.parse(localStorage.getItem('servicos'))
lista.splice(i,1)
localStorage.setItem('servicos',JSON.stringify(lista))
carregarServicos()
}

// CONFIG
function salvarConta(){
localStorage.setItem('user',novoUser.value)
localStorage.setItem('pass',novaSenha.value)
alert('Atualizado!')
}

function resetarDados(){
if(confirm('Apagar tudo?')){
localStorage.clear()
location.reload()
}
}

// TEMA
function toggleTema(){
document.body.classList.toggle('dark')
localStorage.setItem('tema',document.body.classList.contains('dark')?'dark':'light')
}

if(localStorage.getItem('tema')==='dark'){
document.body.classList.add('dark')
}

iniciar()

</script>

</body>
</html>
