<script>

function toggleMenu(){

}

function abrirPagina(p){

document.querySelectorAll(".pagina").forEach(x=>x.style.display="none")

if(p=="clientes"){
document.getElementById("paginaClientes").style.display="block"
}

if(p=="buscar"){
document.getElementById("paginaBuscar").style.display="block"
}

if(p=="servicos"){
document.getElementById("paginaServicos").style.display="block"
listarTodosServicos()
}

if(p=="relatorios"){
document.getElementById("paginaRelatorios").style.display="block"
}

if(p=="todosServicos"){
document.getElementById("paginaTodosServicos").style.display="block"
listarTodosServicos()
}  
  
/* FECHA MENU AUTOMATICO */

<script type="module">

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const db = getFirestore(app)


window.login = async function(){

let email = document.getElementById("email").value
let pass = document.getElementById("password").value

loginScreen.style.display="none"

window.salvarCliente = async function(){

let nome = document.getElementById("nome").value
let telefone = document.getElementById("telefone").value
let cep = document.getElementById("cep").value
let rua = document.getElementById("rua").value
let bairro = document.getElementById("bairro").value
let cidade = document.getElementById("cidade").value

if(window.clienteEditando){

await updateDoc(doc(db,"clientes",window.clienteEditando),{
nome,telefone,cep,rua,bairro,cidade
})

window.clienteEditando=null

}else{

await addDoc(collection(db,"clientes"),{
nome,telefone,cep,rua,bairro,cidade
})

}

listarClientes()

document.getElementById("nome").value=""
document.getElementById("telefone").value=""
document.getElementById("cep").value=""
document.getElementById("rua").value=""
document.getElementById("bairro").value=""
document.getElementById("cidade").value=""

}
  
window.salvarServico = async function(){

let cliente = document.getElementById("clienteServico").value
let descricao = document.getElementById("descricaoServico").value
let valor = document.getElementById("valorServico").value
let pagamento = document.getElementById("formaPagamento").value
let status = document.getElementById("statusServico").value
let statusPagamento = document.getElementById("statusPagamento").value

if(window.servicoEditando){

await updateDoc(doc(db,"servicos",window.servicoEditando),{
cliente,
descricao,
valor:Number(valor),
pagamento,
status,
statusPagamento
})

window.servicoEditando=null

}else{

await addDoc(collection(db,"servicos"),{
cliente,
descricao,
valor:Number(valor),
pagamento,
status,
statusPagamento
})

}

listarTodosServicos()

document.getElementById("clienteServico").value=""
document.getElementById("descricaoServico").value=""
document.getElementById("valorServico").value=""

alert("Serviço salvo")

}
  
window.gerarRelatorio = async function(){

let snap = await getDocs(collection(db,"servicos"))

let total = 0
let recebido = 0
let receber = 0

snap.forEach(doc=>{

let s = doc.data()

let valor = Number(s.valor)

total += valor

if(s.statusPagamento == "Pago"){
recebido += valor
}else{
receber += valor
}

})

document.getElementById("relatorio").innerHTML = `

💰 Total serviços: R$ ${total}<br><br>

✅ Recebido: R$ ${recebido}<br><br>

🕒 A receber: R$ ${receber}

`

}
  
window.excluirServico = async function(id){

if(confirm("Deseja excluir o serviço?")){

await deleteDoc(doc(db,"servicos",id))

listarServicos()

}

}

window.adicionarPagamento = async function(id){

let valor = parseFloat(prompt("Valor do pagamento"))

let ref = doc(db,"servicos",id)

let snap = await getDoc(ref)

let dados = snap.data()

let total = dados.valorTotal
let pago = dados.valorPago || 0

let novoTotal = pago + valor

if(novoTotal > total){

alert("Pagamento maior que o valor do serviço!")
return

}

await updateDoc(ref,{
valorPago: novoTotal
})

alert("Pagamento registrado")

listarServicos()

}
  
window.abrirServicoCliente = function(){

document.getElementById("clienteServico").value = window.clienteAtual

}
  
window.editarServico = function(id,descricao,valor,status){

abrirPagina("servicos")

document.getElementById("descricaoServico").value = descricao
document.getElementById("valorServico").value = valor
document.getElementById("statusServico").value = status

window.servicoEditando = id

}
  
window.excluirCliente = async function(id){

await deleteDoc(doc(db,"clientes",id))

listarClientes()

}

window.editarCliente = function(id,nome,telefone){

document.getElementById("nome").value = nome
document.getElementById("telefone").value = telefone

window.clienteEditando = id

}
  
window.abrirCliente = function(nome){

window.clienteAtual = nome

let clientes = JSON.parse(localStorage.getItem("clientes") || "[]")
let c = clientes.find(x => x.nome === nome)

document.getElementById("nomeClienteTitulo").innerHTML = `
Cliente: ${nome}<br>
📞 ${c.telefone || ""}<br>
📍 ${c.rua || ""}, ${c.bairro || ""} - ${c.cidade || ""}
`

document.querySelectorAll(".pagina").forEach(x => x.style.display="none")

document.getElementById("paginaCliente").style.display="block"

listarHistorico(nome)

/* FECHAR MENU */
document.getElementById("menu").classList.remove("active")

}
  
window.listarHistorico = async function(cliente){

let snap = await getDocs(collection(db,"servicos"))

let html=""

snap.forEach(docSnap=>{

let s = docSnap.data()
let id = docSnap.id

if(s.cliente == cliente){

html += `

<div style="border-bottom:1px solid #eee;padding:10px">

<b>${s.descricao}</b><br>

💰 R$ ${s.valor}<br>

📊 ${s.status}<br>

💳 ${s.statusPagamento || ""}

<br>

<button onclick="editarServico('${id}','${s.descricao}','${s.valor}','${s.status}')">
Editar
</button>

<button onclick="excluirServico('${id}','${cliente}')">
Excluir
</button>

</div>

`

}

})

document.getElementById("historicoServicos").innerHTML = html

}
  
window.listarServicos = async function(){

let snap = await getDocs(collection(db,"servicos"))

let html=""

snap.forEach(docSnap=>{

let s = docSnap.data()
let id = docSnap.id

let status=""

if(s.valorPago >= s.valorTotal){
status="🟢 Pago"
}
else if(s.valorPago > 0){
status="🟡 Parcial"
}
else{
status="🔴 Pendente"
}

html += `

<div style="border-bottom:1px solid #eee;padding:10px">

<b>${s.servico}</b><br>

Valor: ${s.valorTotal}<br>

Pago: ${s.valorPago || 0} / ${s.valorTotal}<br>

Status: ${status}

<br><br>

<button onclick="adicionarPagamento('${id}')">
Pagamento
</button>

<button onclick="editarServico('${id}')">
Editar
</button>

<button onclick="excluirServico('${id}')">
Excluir
</button>

</div>

`

})

document.getElementById("historicoServicos").innerHTML = html

}

</button>

`

window.buscarCEP = async function(){

let cep = document.getElementById("cep").value.replace(/\D/g,"")

if(cep.length != 8){
return
}

try{

let res = await fetch(`https://viacep.com.br/ws/${cep}/json/`)
let dados = await res.json()

if(dados.erro){
alert("CEP não encontrado")
return
}

document.getElementById("rua").value = dados.logradouro || ""
document.getElementById("bairro").value = dados.bairro || ""
document.getElementById("cidade").value = dados.localidade || ""

}catch(e){

alert("Erro ao buscar CEP")

}

}

window.mascaraCEP = function(){

let cep = document.getElementById("cep")

cep.value = cep.value
.replace(/\D/g,"")
.replace(/(\d{5})(\d)/,"$1-$2")
.slice(0,9)

}
  
</script>

</body>
</html>
