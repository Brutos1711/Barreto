```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barreto App</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#f2f2f7;
}

/* TOPO */

.topbar{
background:#1e293b;
color:white;
padding:15px;
font-size:18px;
display:flex;
align-items:center;
}

.menuBtn{
font-size:22px;
margin-right:15px;
cursor:pointer;
}

/* MENU */

.sidebar{
position:fixed;
top:0;
left:-250px;
width:220px;
height:100%;
background:#1e293b;
color:white;
padding-top:20px;
transition:0.3s;
z-index:1000;
}

.sidebar button{
width:100%;
padding:15px;
border:none;
background:none;
color:white;
text-align:left;
font-size:16px;
}

.sidebar button:hover{
background:#334155;
}

.sidebar.active{
left:0;
}

/* CONTAINER */

.container{
max-width:430px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:black;
color:white;
border:none;
cursor:pointer;
}

h2{
text-align:center;
}

.pagina{
display:none;
}

</style>
</head>

<body>

<div id="menu" class="sidebar">

<button onclick="abrirPagina('clientes')">Clientes</button>
<button onclick="abrirPagina('buscar')">Buscar Cliente</button>
<button onclick="abrirPagina('servicos')">Serviços</button>
<button onclick="abrirPagina('relatorios')">Relatórios</button>

</div>

<div class="topbar">
<span class="menuBtn" onclick="toggleMenu()">☰</span>
Barreto App
</div>

<div class="container">

<div id="loginScreen" class="card">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="register()">Criar Conta</button>

</div>

<div id="appScreen" style="display:none;">

<div id="paginaClientes" class="card pagina">

<h2>Cadastro Cliente</h2>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">

<button onclick="salvarCliente()">Salvar</button>

</div>

<div id="paginaBuscar" class="card pagina">

<h2>Buscar Cliente</h2>

<input id="busca" placeholder="Nome">

<button onclick="buscarCliente()">Buscar</button>

<div id="resultado"></div>

</div>

<div id="paginaServicos" class="card pagina">

<h2>Serviço</h2>

<input id="clienteServico" placeholder="Nome cliente">

<input id="descricaoServico" placeholder="Descrição">

<input type="number" id="valorServico" placeholder="Valor">

<select id="formaPagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<button onclick="salvarServico()">Salvar Serviço</button>

</div>

<div id="paginaRelatorios" class="card pagina">

<h2>Financeiro</h2>

<div id="relatorio">

Total serviços: R$ 0<br>
Recebido: R$ 0

</div>

<button onclick="gerarRelatorio()">Atualizar</button>

</div>

<button onclick="logout()">Sair</button>

</div>

</div>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active")
}

function abrirPagina(p){

document.querySelectorAll(".pagina").forEach(x=>x.style.display="none")

if(p=="clientes")document.getElementById("paginaClientes").style.display="block"
if(p=="buscar")document.getElementById("paginaBuscar").style.display="block"
if(p=="servicos")document.getElementById("paginaServicos").style.display="block"
if(p=="relatorios")document.getElementById("paginaRelatorios").style.display="block"

toggleMenu()

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import { 
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"


const firebaseConfig = {

apiKey: "COLE_SUA_APIKEY",
authDomain: "SEU_AUTHDOMAIN",
projectId: "SEU_PROJECTID",
storageBucket: "SEU_BUCKET",
messagingSenderId: "SEU_SENDER",
appId: "SEU_APPID"

}


const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const db = getFirestore(app)


window.login = async function(){

let email = document.getElementById("email").value
let pass = document.getElementById("password").value

await signInWithEmailAndPassword(auth,email,pass)

loginScreen.style.display="none"
appScreen.style.display="block"

}


window.register = async function(){

let email = document.getElementById("email").value
let pass = document.getElementById("password").value

await createUserWithEmailAndPassword(auth,email,pass)

alert("Conta criada")

}


window.logout = async function(){

await signOut(auth)

location.reload()

}


window.salvarCliente = async function(){

let nome = document.getElementById("nome").value
let telefone = document.getElementById("telefone").value

await addDoc(collection(db,"clientes"),{
nome,
telefone
})

alert("Cliente salvo")

}


window.buscarCliente = async function(){

let busca = document.getElementById("busca").value

let snap = await getDocs(collection(db,"clientes"))

let html=""

snap.forEach(doc=>{

let c = doc.data()

if(c.nome.toLowerCase().includes(busca.toLowerCase())){

html += c.nome + " - " + c.telefone + "<br>"

}

})

document.getElementById("resultado").innerHTML=html

}


window.salvarServico = async function(){

let cliente = document.getElementById("clienteServico").value
let descricao = document.getElementById("descricaoServico").value
let valor = document.getElementById("valorServico").value
let pagamento = document.getElementById("formaPagamento").value

await addDoc(collection(db,"servicos"),{

cliente,
descricao,
valor:Number(valor),
pagamento

})

alert("Serviço salvo")

}


window.gerarRelatorio = async function(){

let snap = await getDocs(collection(db,"servicos"))

let total = 0

snap.forEach(doc=>{

let s = doc.data()

total += Number(s.valor)

})

document.getElementById("relatorio").innerHTML = 
"Total serviços: R$ "+total

}

</script>

</body>
</html>
```
