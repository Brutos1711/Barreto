<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barreto App</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#f2f2f7;
}

/* BARRA SUPERIOR */

.topbar{
background:#1e293b;
color:white;
padding:15px;
font-size:18px;
display:flex;
align-items:center;
}

.menuBtn{
font-size:22px;
margin-right:15px;
cursor:pointer;
}

/* MENU LATERAL */

.sidebar{
position:fixed;
top:0;
left:-250px;
width:220px;
height:100%;
background:#1e293b;
color:white;
padding-top:20px;
transition:0.3s;
z-index:1000;
}

.sidebar button{
width:100%;
padding:15px;
border:none;
background:none;
color:white;
text-align:left;
font-size:16px;
}

.sidebar button:hover{
background:#334155;
}

.sidebar.active{
left:0;
}

/* CONTAINER */

.container{
max-width:430px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:black;
color:white;
border:none;
cursor:pointer;
}

h2{
text-align:center;
}

.pagina{
display:none;
}

</style>
</head>

<body>

<!-- MENU LATERAL -->

<div id="menu" class="sidebar">

<button onclick="abrirPagina('clientes')">Clientes</button>
<button onclick="abrirPagina('buscar')">Buscar Cliente</button>
<button onclick="abrirPagina('servicos')">Serviços</button>
<button onclick="abrirPagina('relatorios')">Relatórios</button>

</div>

<!-- BARRA SUPERIOR -->

<div class="topbar">
<span class="menuBtn" onclick="toggleMenu()">☰</span>
Barreto App
</div>

<div class="container">

<!-- LOGIN -->

<div id="loginScreen" class="card">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="register()">Criar Conta</button>

</div>

<!-- APP -->

<div id="appScreen" style="display:none;">

<!-- CADASTRO CLIENTE -->

<div id="paginaClientes" class="card pagina">

<h2>Cadastro Cliente</h2>

<input type="text" id="nome" placeholder="Nome">
<input type="text" id="telefone" placeholder="Telefone">
<input type="text" id="cep" placeholder="CEP">

<select id="tipo">
<option value="">Tipo de imóvel</option>
<option value="Casa">Casa</option>
<option value="Apartamento">Apartamento</option>
</select>

<input type="text" id="numero" placeholder="Número">
<input type="text" id="complemento" placeholder="Complemento">

<input type="text" id="rua" placeholder="Rua">
<input type="text" id="bairro" placeholder="Bairro">
<input type="text" id="cidade" placeholder="Cidade">

<button onclick="salvarCliente()">Salvar</button>

</div>

<!-- BUSCAR CLIENTE -->

<div id="paginaBuscar" class="card pagina">

<h2>Buscar Cliente</h2>

<input type="text" id="busca" placeholder="Digite o nome">
<button onclick="buscarCliente()">Buscar</button>

<div id="resultado"></div>

</div>

<!-- SERVIÇOS -->

<div id="paginaServicos" class="card pagina">

<h2>Serviços do Cliente</h2>

<div id="areaServicos">

<input type="text" id="descricaoServico" placeholder="Descrição">

<input type="number" id="valorServico" placeholder="Valor">

<select id="formaPagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
<option>Transferência</option>
</select>

<label>Início Previsto</label>
<input type="date" id="dataInicioPrevista">

<label>Fim Previsto</label>
<input type="date" id="dataFimPrevista">

<select id="statusServico">
<option>Orçamento</option>
<option>Agendado</option>
<option>Em andamento</option>
<option>Finalizado</option>
</select>

<button onclick="salvarServico()">Salvar Serviço</button>

<hr>

<div id="listaServicos"></div>

</div>

</div>

<!-- RELATÓRIO -->

<div id="paginaRelatorios" class="card pagina">

<h2>Relatório Financeiro</h2>

<div id="relatorioFinanceiro">

💰 Total Serviços: R$ 0<br>
💵 Total Recebido: R$ 0<br>
⚠️ Total Pendente: R$ 0

</div>

<button onclick="gerarRelatorio()">Atualizar Relatório</button>

</div>

<button onclick="logout()">Sair</button>

</div>

</div>

<script>

/* MENU */

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

function abrirPagina(pagina){

document.querySelectorAll(".pagina").forEach(p=>{
p.style.display="none";
});

if(pagina==="clientes"){
document.getElementById("paginaClientes").style.display="block";
}

if(pagina==="buscar"){
document.getElementById("paginaBuscar").style.display="block";
}

if(pagina==="servicos"){
document.getElementById("paginaServicos").style.display="block";
}

if(pagina==="relatorios"){
document.getElementById("paginaRelatorios").style.display="block";
}

toggleMenu();
}

</script>

<!-- SEU SCRIPT FIREBASE CONTINUA ABAIXO IGUAL -->

<script type="module">

/* TODO SEU SCRIPT FIREBASE QUE VOCÊ ENVIOU PERMANECE IGUAL */

</script>

</body>
</html>
